name: Build and Release

run-name: Build and release ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Create or update the GitHub release for the package version"
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-release.yml"
      - "package.json"
      - "package-lock.json"
      - "index.html"
      - "styles.css"
      - "script.js"
      - "rates.js"
      - "build/icon.ico"
      - "build/source-icon.png"
      - "electron/**"
      - "scripts/check-calculator.js"

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Determine package version
        id: meta
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "package.json version is empty."
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install dependencies
        run: npm ci

      - name: Run calculator checks
        run: npm run check

      - name: Build Windows installer
        run: npm run build:win -- --publish never

      - name: Verify release assets
        shell: pwsh
        run: |
          $assets = Get-ChildItem -Path dist -File -Include *.exe,*.blockmap,latest*.yml -Recurse
          if (-not $assets) {
            throw "No installer release assets were created under dist/."
          }

          $assets | ForEach-Object { $_.FullName }

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Book-Resale-Calculator-win-${{ steps.meta.outputs.version }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-windows
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release) }}
    permissions:
      contents: write
    steps:
      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.build-windows.outputs.tag }}
          VERSION: ${{ needs.build-windows.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping release creation."
            exit 0
          fi

          mapfile -d '' assets < <(find release-assets -type f -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          printf 'Release assets:\n'
          printf '  %s\n' "${assets[@]}"

          title="Book Resale Calculator $TAG"
          notes="Automated Windows installer release for Book Resale Calculator $VERSION. Built from $GITHUB_SHA."

          if gh api "repos/$GH_REPO/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Moving existing tag $TAG to $GITHUB_SHA."
            gh api \
              --method PATCH \
              "repos/$GH_REPO/git/refs/tags/$TAG" \
              -f sha="$GITHUB_SHA" \
              -F force=true >/dev/null
          else
            echo "Creating tag $TAG at $GITHUB_SHA."
            gh api \
              --method POST \
              "repos/$GH_REPO/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$GITHUB_SHA" >/dev/null
          fi

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; updating release metadata and replacing assets."
            gh release edit "$TAG" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "$notes"
            gh release upload "$TAG" "${assets[@]}" \
              --repo "$GH_REPO" \
              --clobber
          else
            gh release create "$TAG" "${assets[@]}" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "$notes"
          fi

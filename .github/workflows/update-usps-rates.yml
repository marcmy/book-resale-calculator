name: Update USPS rates

on:
  workflow_dispatch:
  schedule:
    - cron: "23 12 * * 1"

permissions:
  contents: write

jobs:
  update-media-mail-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Update Media Mail rates
        run: node scripts/update-usps-media-mail-rates.js

      - name: Commit changed rates
        run: |
          if git diff --quiet -- rates.js; then
            echo "No USPS Media Mail rate changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rates.js
          git commit -m "Update USPS Media Mail rates"
          git push origin HEAD:main
